name: Build & Release Plugin

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore JellyfinUpcomingMedia.csproj

      - name: Build
        run: dotnet build JellyfinUpcomingMedia.csproj --configuration Release --no-restore

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JellyfinUpcomingMedia
          path: bin/Release/net9.0/JellyfinUpcomingMedia.dll

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build Release
        run: dotnet build JellyfinUpcomingMedia.csproj --configuration Release

      - name: Compute DLL checksum (MD5)
        id: md5
        run: |
          MD5=$(md5sum bin/Release/net9.0/JellyfinUpcomingMedia.dll | awk '{print $1}')
          echo "md5=$MD5" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Release/net9.0/JellyfinUpcomingMedia.dll
          generate_release_notes: true
