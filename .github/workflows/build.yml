name: Build & Release Plugin

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore JellyfinUpcomingMedia.csproj

      - name: Build
        run: dotnet build JellyfinUpcomingMedia.csproj --configuration Release --no-restore

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JellyfinUpcomingMedia
          path: bin/Release/net9.0/JellyfinUpcomingMedia.dll

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build Release
        run: dotnet build JellyfinUpcomingMedia.csproj --configuration Release

      - name: Package as ZIP
        run: |
          cd bin/Release/net9.0
          zip -j ../../../upcoming-media-1.0.0.0.zip JellyfinUpcomingMedia.dll

      - name: Compute checksum (MD5)
        id: md5
        run: |
          MD5=$(md5sum upcoming-media-1.0.0.0.zip | awk '{print $1}')
          echo "md5=$MD5" >> "$GITHUB_OUTPUT"
          echo "Checksum: $MD5"

      - name: Update manifest.json with checksum
        run: |
          sed -i 's/"checksum": "[^"]*"/"checksum": "${{ steps.md5.outputs.md5 }}"/' manifest.json

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --cached --quiet || git commit -m "Update manifest checksum for ${{ github.ref_name }}"
          git push origin HEAD:main || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: upcoming-media-1.0.0.0.zip
          generate_release_notes: true
